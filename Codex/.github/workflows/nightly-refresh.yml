name: Nightly IMDb Refresh

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh pipeline
        env:
          IMDB_MIN_VOTES: "1000"
        run: python Python/nightly_refresh.py

      - name: Commit refreshed data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Other Files/movieRatingsList.csv" "Other Files/pred_scores.csv" "Other Files/fp_pred_scores.csv"
          git diff --cached --quiet || git commit -m "chore: nightly catalog and prediction refresh"
          git push
